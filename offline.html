<!doctype html>
<html lang="en-HK">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | HK School Explorer</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", sans-serif;
            background: #f2f6f2;
            color: #1e2a1f;
        }

        article {
            background: white;
            border: 1px solid #d7e4d7;
            border-radius: 14px;
            padding: 1.2rem;
            width: min(90vw, 420px);
            box-shadow: 0 12px 20px rgba(16, 54, 31, 0.1);
        }

        h1 {
            margin-top: 0;
        }
    </style>
</head>

<body>
    <article>
        <h1>You are offline</h1>
        <p>The app shell is available, but live school data cannot be refreshed right now.</p>
        <p>Reconnect to the internet and reopen the app to get the latest information.</p>
    </article>
</body>

</html>
