<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK School Info PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>HK School Directory</h1>
        <button id="install-btn" hidden>Install App</button>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search schools by name or district...">
        </section>

        <div id="loading" class="loading">Loading school data...</div>
        
        <section id="school-list" class="school-list">
            <!-- School cards will be injected here via JavaScript -->
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('ServiceWorker registered'))
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
</body>
</html>
