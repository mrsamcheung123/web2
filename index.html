<!doctype html>
<html lang="en-HK">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a5c36" />
    <meta name="description" content="Find and compare Hong Kong schools with offline-capable PWA support." />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon-192.svg" />
    <title>HK School Explorer PWA</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="hero">
        <div class="hero__content">
            <p class="eyebrow">COMP 3130SEF Mobile Application Project</p>
            <h1>HK School Explorer</h1>
            <p class="subtitle">Search 3,000+ schools, save favorites, and install as an app.</p>
            <div class="hero__actions">
                <button id="installButton" class="btn btn--primary" hidden>Install App</button>
                <button id="refreshButton" class="btn btn--ghost">Refresh Data</button>
            </div>
            <p id="installHint" class="hint" hidden></p>
        </div>
        <div class="hero__badge" aria-hidden="true">
            <img src="assets/badge.svg" alt="" />
        </div>
    </header>

    <main class="layout">
        <section class="panel filters">
            <h2>Find Schools</h2>
            <label class="field">
                <span>Keyword</span>
                <input id="searchInput" type="search" placeholder="School name, district, address..." />
            </label>

            <label class="field">
                <span>District</span>
                <select id="districtSelect">
                    <option value="">All districts</option>
                </select>
            </label>

            <label class="field">
                <span>School level</span>
                <select id="levelSelect">
                    <option value="">All levels</option>
                </select>
            </label>

            <label class="field field--inline">
                <input id="favoritesOnly" type="checkbox" />
                <span>Show favorites only</span>
            </label>

            <p class="meta" id="resultMeta">Loading data...</p>
        </section>

        <section class="panel list-panel">
            <div id="statusBanner" class="status" role="status" aria-live="polite">Preparing app...</div>
            <div id="schoolList" class="school-list" aria-live="polite"></div>
        </section>
    </main>

    <dialog id="detailDialog" class="detail-dialog">
        <article id="detailContent"></article>
        <form method="dialog" class="dialog-actions">
            <button class="btn btn--primary">Close</button>
        </form>
    </dialog>

    <template id="cardTemplate">
        <article class="school-card">
            <header class="school-card__header">
                <h3 class="school-card__title"></h3>
                <button class="icon-btn favorite-btn" type="button" aria-label="Toggle favorite">☆</button>
            </header>
            <p class="school-card__line category"></p>
            <p class="school-card__line district"></p>
            <p class="school-card__line address"></p>
            <div class="school-card__actions">
                <button class="btn btn--small details-btn" type="button">Details</button>
                <a class="btn btn--small btn--ghost map-btn" target="_blank" rel="noopener">Map</a>
            </div>
        </article>
    </template>

    <script src="app.js" defer></script>
</body>

</html>
